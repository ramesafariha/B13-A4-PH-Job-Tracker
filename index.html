<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Job Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="dashboard">
        <h1>Job Application Tracker</h1>
        <div class="stats">
            <div class="card-1">
                <h3>Total</h3>
                <p id="totalCount">8</p>
            </div>
            <div class="card-2">
                <h3>Interview</h3>
                <p id="interviewCount">0</p>
            </div>
            <div class="card-3">
                <h3>Rejected</h3>
                <p id="rejectedCount">0</p>
            </div>
        </div>
    </header>
    <section class="jobs-section">
        <div class="section-header">
            <h2>Available Jobs</h2>
            <span id="tabCount">8</span>
        </div>
        <div class="tabs">
            <button class="tab active" data-tab="all">All</button>
            <button class="tab" data-tab="interview">Interview</button>
            <button class="tab" data-tab="rejected">Rejected</button>
        </div>
        <div id="jobsContainer" class="jobs-container"></div>
        <div id="emptyState" class="empty hidden">
            <img src="image/jobs.png">
            <h3>No jobs available</h3>
            <p>Check back soon for new job opportunities.</p>
        </div>
    </section>
<script src="script.js"></script>
</body>
</html>
